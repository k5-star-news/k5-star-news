<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>k5 News Center V5</title>
    <style>
    :root { --bg: #050505; --card: #121212; --line: #222; }
    body { background: var(--bg); color: #ccc; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; }
    .container { display: grid; grid-template-columns: 1fr; gap: 15px; align-items: start; }
    @media (min-width: 1400px) { .container { grid-template-columns: repeat(5, 1fr); } }
    .section { background: var(--card); border-radius: 10px; padding: 15px; border: 1px solid var(--line); }
    
    .sec-主要ニュース { border-top: 3px solid #3498db; } .head-主要ニュース { color: #3498db; }
    .sec-推しグループ { border-top: 3px solid #e91e63; } .head-推しグループ { color: #e91e63; }
    .sec-巨人 { border-top: 3px solid #f39c12; } .head-巨人 { color: #f39c12; }
    .sec-マイチーム { border-top: 3px solid #00d2ff; } .head-マイチーム { color: #00d2ff; }
    .sec-AI・技術 { border-top: 3px solid #9b59b6; } .head-AI・技術 { color: #9b59b6; }

    .header { font-size: 1.1rem; font-weight: bold; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--line); }
    .article { display: block; text-decoration: none; padding: 12px 0; border-bottom: 1px solid #1a1a1a; }
    .article:last-child { border-bottom: none; }
    
    .title { font-size: 0.95rem; color: #4da6ff; font-weight: 600; line-height: 1.4; margin-bottom: 5px; }
    .summary { font-size: 0.85rem; color: #eeeeee; line-height: 1.5; }
    .time { font-size: 0.75rem; color: #777; margin-top: 6px; text-align: right; }
  </style></head><body><div class="container"><div class="section sec-主要ニュース"><div class="header head-主要ニュース">🌍 主要ニュース</div></div><div class="section sec-推しグループ"><div class="header head-推しグループ">🌟 推しグループ</div></div><div class="section sec-巨人"><div class="header head-巨人">⚾ 巨人</div></div><div class="section sec-マイチーム"><div class="header head-マイチーム">🏆 マイチーム</div></div><div class="section sec-AI・技術"><div class="header head-AI・技術">🤖 AI・技術</div></div></div></body></html>
